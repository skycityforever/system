<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极境守护 - 登录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../static/login_particle.css">
    <link rel="stylesheet" href="../static/login.css">
</head>
<body>
    <canvas id="particleCanvas"></canvas>

    <div class="login-card glass-panel">
        <h3 class="text-center neon-title mb-4">极境守护登录系统</h3>

        <!-- 登录表单（原有结构 + 外层包裹） -->
        <div id="loginForm" class="form-box active">
            {% if error %}
            <div class="message error">{{ error }}</div>
            {% endif %}

            <form method="POST" action="{{ url_for('auth.login') }}">
                <div class="mb-3">
                    <label class="form-label">用户名</label>
                    <input type="text" class="form-control" name="username" required>
                </div>

                <div class="mb-4">
                    <label class="form-label">密码</label>
                    <input type="password" class="form-control" name="password" required>
                </div>

                <button type="submit" class="btn btn-primary w-100">登录系统</button>
            </form>

            <div class="text-center mt-4">
                <a onclick="toggleForm()">还没有账号？立即注册</a>
            </div>
        </div>

        <!-- ====================== -->
        <!-- 以下是 全新注册表单 代码 -->
        <!-- ====================== -->
        <div id="registerForm" class="form-box">
            <div id="regMsg" class="message"></div>

            <form id="regForm">
                <div class="mb-3">
                    <label class="form-label">用户名</label>
                    <input type="text" class="form-control" id="regUsername" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">密码</label>
                    <input type="password" class="form-control" id="regPassword" required>
                </div>

                <div class="mb-4">
                    <label class="form-label">确认密码</label>
                    <input type="password" class="form-control" id="regRepassword" required>
                </div>

                <button type="submit" class="btn btn-primary w-100">完成注册</button>
            </form>

            <div class="text-center mt-4">
                <a onclick="toggleForm()">已有账号？返回登录</a>
            </div>
        </div>
    </div>

    <!-- login.html中，在引入login.js前添加全局变量 -->
    <script>
    <!-- 把动态路径暴露为全局变量-->
        window.registerApiUrl = "{{ url_for('auth.register_ajax') }}";
    </script>

    <script src="../static/login.js"></script>

    <script src="../static/login_particle.js"></script>
</body>
</html>
