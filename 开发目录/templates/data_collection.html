<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极境守护 - 数据采集</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="../static/data_collection.css">
</head>
<body class="min-h-screen bg-slate-900 text-white">
<!-- 导航栏 -->
<nav class="h-16 glass-panel fixed top-0 w-full z-50 flex items-center justify-between px-6 border-b border-cyan-500/30">
  <div class="flex items-center gap-3">
    <span class="iconify text-3xl text-cyan-400" data-icon="solar:shield-warning-bold-duotone"></span>
    <span class="text-xl font-bold tracking-wider text-white">POLAR GUARD <span class="text-cyan-400 text-sm">数据采集</span></span>
  </div>
  <div class="flex items-center gap-8 text-sm">
    <a class="nav-link hover:text-cyan-400 whitespace-nowrap" href="/">导航中心</a>
    <a class="hover:text-cyan-400 whitespace-nowrap" href="/object_detection_controlcenter">目标检测</a>
    <a class="hover:text-cyan-400 whitespace-nowrap" href="/visual_dashboard">监控中心</a>
    <a class="hover:text-cyan-400 whitespace-nowrap" href="/history">历史溯源</a>
    <a class="hover:text-cyan-400 whitespace-nowrap" href="/historical_data_analysis">数据分析</a>
    <a class="hover:text-cyan-400 whitespace-nowrap" href="/model_management">模型管理</a>
    <a class="hover:text-cyan-400 whitespace-nowrap" href="/edge_device_management">设备管理</a>
    <a class="text-cyan-400 border-b-2 border-cyan-400 pb-1 hover:text-cyan-400 whitespace-nowrap" href="/data_collection">数据采集</a>
    <a class="w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center ml-2 relative flex-shrink-0" href="/user_center">
      <span class="iconify" data-icon="solar:user-bold"></span>
      <span class="absolute top-0 right-0 w-2 h-2 bg-red-500 rounded-full"></span>
    </a>
  </div>
</nav>

<main class="pt-24 px-8 pb-24 max-w-[1440px] mx-auto">
    <!-- 数据概览 -->
    <section class="mb-10">
        <h2 class="text-xl font-bold mb-6 text-cyan-300">采集数据概览</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="stat-card p-6 rounded-xl">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-sm font-semibold text-slate-300">总采集条数</h3>
                    <span class="iconify text-cyan-400 text-xl" data-icon="solar:database-bold"></span>
                </div>
                <p class="text-3xl font-bold text-white" id="totalRecords">0</p>
            </div>
            <div class="stat-card p-6 rounded-xl">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-sm font-semibold text-slate-300">场景分布</h3>
                    <span class="iconify text-purple-400 text-xl" data-icon="solar:pie-chart-bold"></span>
                </div>
                <canvas id="sceneChart" height="120" style="max-height:120px;"></canvas>
            </div>
            <div class="stat-card p-6 rounded-xl">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-sm font-semibold text-slate-300">今日采集</h3>
                    <span class="iconify text-green-400 text-xl" data-icon="solar:calendar-bold"></span>
                </div>
                <p class="text-3xl font-bold text-white" id="todayRecords">0</p>
            </div>
        </div>
    </section>

    <!-- 数据采集表单 -->
    <section class="mb-10">
        <h2 class="text-xl font-bold mb-6 text-cyan-300">场景选择与数据采集</h2>
        <div class="stat-card p-6 rounded-xl">
            <form id="dataCollectionForm">
                <!-- 场景选择 -->
                <div class="mb-6">
                    <label class="block text-sm font-semibold text-slate-300 mb-2">选择场景</label>
                    <select id="scene" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-white">
                        <option value="home">家庭场景</option>
                        <option value="factory">工厂车间</option>
                        <option value="orchard">果园场景</option>
                        <option value="school">校园场景</option>
                        <option value="hospital">医院场景</option>
                        <option value="mall">商场场景</option>
                    </select>
                </div>

                <!-- 基本信息 -->
                <div class="mb-6">
                    <h3 class="text-sm font-semibold text-cyan-400 mb-3">基本信息（必填）</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs text-slate-400 mb-1">姓名</label>
                            <input type="text" name="name" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3" required>
                        </div>
                        <div>
                            <label class="block text-xs text-slate-400 mb-1">人脸数据（Base64/URL）</label>
                            <input type="text" name="face_data" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3" required>
                        </div>
                        <div>
                            <label class="block text-xs text-slate-400 mb-1">联系电话</label>
                            <input type="tel" name="phone" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3" required>
                        </div>
                        <div>
                            <label class="block text-xs text-slate-400 mb-1">采集地点</label>
                            <input type="text" name="location" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3" required>
                        </div>
                        <div>
                            <label class="block text-xs text-slate-400 mb-1">年龄</label>
                            <input type="number" name="age" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3">
                        </div>
                        <div>
                            <label class="block text-xs text-slate-400 mb-1">性别</label>
                            <select name="gender" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-white">
                                <option value="male">男</option>
                                <option value="female">女</option>
                                <option value="other">其他</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- 场景专属信息 -->
                <div id="sceneSpecificFields">
                    <!-- 工厂场景专属 -->
                    <div class="factory-field hidden mb-6">
                        <h3 class="text-sm font-semibold text-yellow-400 mb-3">工厂专属信息</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs text-slate-400 mb-1">工号（必填）</label>
                                <input type="text" name="worker_id" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3" required>
                            </div>
                            <div>
                                <label class="block text-xs text-slate-400 mb-1">车间编号</label>
                                <input type="text" name="workshop_id" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3">
                            </div>
                            <div>
                                <label class="block text-xs text-slate-400 mb-1">岗位名称</label>
                                <input type="text" name="position" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3">
                            </div>
                            <div>
                                <label class="block text-xs text-slate-400 mb-1">入职年限</label>
                                <input type="number" name="work_years" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3">
                            </div>
                        </div>
                    </div>

                    <!-- 果园场景专属 -->
                    <div class="orchard-field hidden mb-6">
                        <h3 class="text-sm font-semibold text-green-400 mb-3">果园专属信息</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs text-slate-400 mb-1">果园编号</label>
                                <input type="text" name="orchard_id" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3">
                            </div>
                            <div>
                                <label class="block text-xs text-slate-400 mb-1">作物类型</label>
                                <input type="text" name="crop_type" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3">
                            </div>
                            <div>
                                <label class="block text-xs text-slate-400 mb-1">种植面积(亩)</label>
                                <input type="number" name="area" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3">
                            </div>
                            <div>
                                <label class="block text-xs text-slate-400 mb-1">种植年限</label>
                                <input type="number" name="plant_years" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3">
                            </div>
                        </div>
                    </div>

                    <!-- 校园场景专属 -->
                    <div class="school-field hidden mb-6">
                        <h3 class="text-sm font-semibold text-blue-400 mb-3">校园专属信息</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs text-slate-400 mb-1">学号/工号</label>
                                <input type="text" name="school_id" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3" required>
                            </div>
                            <div>
                                <label class="block text-xs text-slate-400 mb-1">身份类型</label>
                                <select name="school_role" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-white">
                                    <option value="student">学生</option>
                                    <option value="teacher">教师</option>
                                    <option value="staff">职工</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs text-slate-400 mb-1">学院/部门</label>
                                <input type="text" name="department" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3">
                            </div>
                            <div>
                                <label class="block text-xs text-slate-400 mb-1">年级/教龄</label>
                                <input type="text" name="grade_or_years" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3">
                            </div>
                        </div>
                    </div>

                    <!-- 医院场景专属 -->
                    <div class="hospital-field hidden mb-6">
                        <h3 class="text-sm font-semibold text-red-400 mb-3">医院专属信息</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs text-slate-400 mb-1">工号/患者号</label>
                                <input type="text" name="hospital_id" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3" required>
                            </div>
                            <div>
                                <label class="block text-xs text-slate-400 mb-1">身份类型</label>
                                <select name="hospital_role" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-white">
                                    <option value="doctor">医生</option>
                                    <option value="nurse">护士</option>
                                    <option value="patient">患者</option>
                                    <option value="staff">职工</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs text-slate-400 mb-1">科室/病区</label>
                                <input type="text" name="department" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3">
                            </div>
                            <div>
                                <label class="block text-xs text-slate-400 mb-1">从业年限/病情</label>
                                <input type="text" name="work_or_illness" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3">
                            </div>
                        </div>
                    </div>

                    <!-- 商场场景专属 -->
                    <div class="mall-field hidden mb-6">
                        <h3 class="text-sm font-semibold text-purple-400 mb-3">商场专属信息</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs text-slate-400 mb-1">员工号/顾客ID</label>
                                <input type="text" name="mall_id" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3" required>
                            </div>
                            <div>
                                <label class="block text-xs text-slate-400 mb-1">身份类型</label>
                                <select name="mall_role" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-white">
                                    <option value="staff">员工</option>
                                    <option value="customer">顾客</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs text-slate-400 mb-1">楼层/店铺</label>
                                <input type="text" name="floor_or_shop" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3">
                            </div>
                            <div>
                                <label class="block text-xs text-slate-400 mb-1">从业年限/消费频次</label>
                                <input type="text" name="work_or_frequency" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 提交按钮 -->
                <button type="submit" class="btn-primary px-6 py-3 rounded-lg w-full md:w-auto">提交采集数据</button>
            </form>

            <!-- 提交结果提示 -->
            <div id="submitResult" class="mt-6 text-center hidden"></div>
        </div>
    </section>

    <!-- 采集记录列表 -->
    <section class="mb-10">
        <h2 class="text-xl font-bold mb-6 text-cyan-300">采集记录</h2>
        <div class="stat-card p-6 rounded-xl">
            <div class="flex justify-between items-center mb-4">
                <div class="flex gap-2">
                    <button class="scene-filter-btn px-3 py-1 rounded-lg text-sm" data-scene="">全部</button>
                    <button class="scene-filter-btn px-3 py-1 rounded-lg text-sm" data-scene="home">家庭</button>
                    <button class="scene-filter-btn px-3 py-1 rounded-lg text-sm" data-scene="factory">工厂</button>
                    <button class="scene-filter-btn px-3 py-1 rounded-lg text-sm" data-scene="orchard">果园</button>
                    <button class="scene-filter-btn px-3 py-1 rounded-lg text-sm" data-scene="school">校园</button>
                    <button class="scene-filter-btn px-3 py-1 rounded-lg text-sm" data-scene="hospital">医院</button>
                    <button class="scene-filter-btn px-3 py-1 rounded-lg text-sm" data-scene="mall">商场</button>
                </div>
                <div class="text-xs text-slate-400">共 <span id="listTotal">0</span> 条记录</div>
            </div>
            <div class="max-h-96 overflow-y-auto custom-scrollbar" id="recordsList">
                <!-- 动态生成记录 -->
            </div>
        </div>
    </section>
</main>

<!-- 页脚 -->
<footer class="glass-panel py-6 border-t border-cyan-500/20">
    <div class="max-w-[1440px] mx-auto px-8 text-center text-slate-400 text-xs">
        <p>© 2025 极境守护目标检测系统 | 使用 ViT-Polaris 模型构建</p>
        <p class="mt-1">本系统仅供参考，不作为专业决策建议</p>
    </div>
</footer>

<script src="../static/data_collection.js"></script>
</body>
</html>
