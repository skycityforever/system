<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>极境守护 - 数据分析中心</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

<link rel="stylesheet" href="../static/historical_data_analysis.css">
</head>

<body class="min-h-screen">
<!-- 加载动画 -->
<div class="loader-container" id="loaderContainer">
    <div class="loader"></div>
    <div class="loader-text">系统加载中...</div>
</div>

<!-- 导航栏 -->
<nav class="h-16 glass-panel fixed top-0 w-full z-50 flex items-center justify-between px-6 border-b border-cyan-500/30">
  <div class="flex items-center gap-3">
    <span class="iconify text-3xl text-cyan-400" data-icon="solar:shield-warning-bold-duotone"></span>
    <span class="text-xl font-bold tracking-wider text-white">POLAR GUARD <span class="text-cyan-400 text-sm">数据分析中心</span></span>
  </div>
  <div class="flex items-center gap-8 text-sm">
    <a class="nav-link hover:text-cyan-400 whitespace-nowrap" href="/">导航中心</a>
    <a class="hover:text-cyan-400 whitespace-nowrap" href="/object_detection_controlcenter">目标检测</a>
    <a class="hover:text-cyan-400 whitespace-nowrap" href="/visual_dashboard">监控中心</a>
    <a class="hover:text-cyan-400 whitespace-nowrap" href="/history">历史溯源</a>
    <a class="text-cyan-400 border-b-2 border-cyan-400 pb-1 hover:text-cyan-400 whitespace-nowrap" href="/historical_data_analysis">数据分析</a>
    <a class="hover:text-cyan-400 whitespace-nowrap" href="/model_management">模型管理</a>
    <a class="hover:text-cyan-400 whitespace-nowrap" href="/edge_device_management">设备管理</a>
    <a class="w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center ml-2 relative flex-shrink-0" href="/user_center">
      <span class="iconify" data-icon="solar:user-bold"></span>
      <span class="absolute top-0 right-0 w-2 h-2 bg-red-500 rounded-full"></span>
    </a>
  </div>
</nav>

<main class="pt-24 px-8 pb-12 max-w-[1440px] mx-auto">
    <!-- 数据概览 -->
    <section class="mb-10">
        <h2 class="text-xl font-bold mb-6 text-cyan-300">数据概览</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            <div class="stat-card p-6 rounded-xl">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-sm font-semibold text-slate-300">总检测次数</h3>
                    <span class="iconify text-cyan-400 text-xl" data-icon="solar:flask-bold"></span>
                </div>
                <p class="text-3xl font-bold text-white" id="totalDetections">0</p>
                <p class="text-xs text-slate-400 mt-2">自系统运行以来的检测总数</p>
            </div>

            <div class="stat-card p-6 rounded-xl">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-sm font-semibold text-slate-300">目标类别数</h3>
                    <span class="iconify text-green-400 text-xl" data-icon="solar:bug-bold"></span>
                </div>
                <p class="text-3xl font-bold text-white" id="classCount">0</p>
                <p class="text-xs text-slate-400 mt-2">已识别的目标类别数量</p>
            </div>

            <div class="stat-card p-6 rounded-xl">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-sm font-semibold text-slate-300">目标总数</h3>
                    <span class="iconify text-red-400 text-xl" data-icon="solar:virus-bold"></span>
                </div>
                <p class="text-3xl font-bold text-white" id="totalObjects">0</p>
                <p class="text-xs text-slate-400 mt-2">所有检测中发现的目标总数</p>
            </div>

            <div class="stat-card p-6 rounded-xl">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-sm font-semibold text-slate-300">平均置信度</h3>
                    <span class="iconify text-purple-400 text-xl" data-icon="solar:percent-bold"></span>
                </div>
                <p class="text-3xl font-bold text-white" id="avgConfidence">0%</p>
                <p class="text-xs text-slate-400 mt-2">所有检测结果的平均置信度</p>
            </div>
        </div>
    </section>

    <!-- 目标分布 -->
    <section class="mb-10">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold text-cyan-300">目标分布</h2>
            <div class="flex gap-2">
                <button id="show-pie" class="btn-primary px-4 py-1.5 rounded-lg text-sm">饼图</button>
                <button id="show-bar" class="btn-secondary px-4 py-1.5 rounded-lg text-sm">柱状图</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 chart-container p-6 rounded-xl">
                <canvas id="pestDistributionChart" height="300"></canvas>
            </div>

            <div class="chart-container p-6 rounded-xl">
                <h3 class="text-sm font-semibold mb-4 text-slate-200">目标分布详情</h3>
                <div class="space-y-4 max-h-[300px] overflow-y-auto pr-2 custom-scrollbar" id="distributionDetails">
                    <!-- 动态生成 -->
                </div>
            </div>
        </div>
    </section>

    <!-- 检测趋势 -->
    <section class="mb-10">
        <h2 class="text-xl font-bold mb-6 text-cyan-300">目标检测趋势</h2>
        <div class="chart-container p-6 rounded-xl">
            <div class="flex justify-between items-center mb-4">
                <span class="text-sm text-slate-200">检测趋势（按日期）</span>
                <button id="trend-bar" class="btn-primary px-4 py-1.5 rounded-lg text-sm">柱状图</button>
            </div>
            <div id="trendChartContainer" class="relative">
                <canvas id="detectionTrendChart" height="350"></canvas>
                <div id="chartNoData" class="absolute inset-0 flex items-center justify-center bg-slate-900/80 z-10 hidden">
                    <div class="text-center">
                        <span class="iconify text-slate-500 text-5xl mb-3" data-icon="solar:chart-line-linear"></span>
                        <p class="text-slate-400 text-sm">暂无趋势数据</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 置信度密度分布 -->
    <section class="mb-10">
        <h2 class="text-xl font-bold mb-6 text-cyan-300">检测置信度密度分布</h2>
        <div class="chart-container p-6 rounded-xl">
            <canvas id="confidenceDistributionChart" height="300"></canvas>
        </div>
    </section>

    <!-- 目标严重程度分析 -->
    <section class="mb-10">
        <h2 class="text-xl font-bold mb-6 text-cyan-300">目标置信程度分析</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="severityAnalysis">
            <!-- 动态生成 -->
        </div>
    </section>
</main>

<!-- 页脚 -->
<footer class="glass-panel py-6 border-t border-cyan-500/20">
    <div class="max-w-[1440px] mx-auto px-8 text-center text-slate-400 text-xs">
        <p>© 2025 极境守护目标检测系统 | 使用 ViT-Polaris 模型构建</p>
        <p class="mt-1">本系统仅供参考，不作为专业决策建议</p>
    </div>
</footer>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // 加载动画控制
    setTimeout(() => {
        hideLoader();
    }, 1500);

    function hideLoader() {
        const loaderContainer = document.getElementById('loaderContainer');
        if (loaderContainer) {
            loaderContainer.classList.add('loader-hidden');
            setTimeout(() => {
                loaderContainer.remove();
            }, 500);
        }
    }

    // 从后端获取检测记录数据
    fetch('/api/detection_records')
        .then(response => response.json())
        .then(data => {
            if (!data.success || !data.records) {
                console.error('获取数据失败:', data.msg);
                return;
            }
            const records = data.records;
            processData(records);
        })
        .catch(err => {
            console.error('请求数据失败:', err);
        });

    function processData(records) {
        // 1. 基础统计
        const totalDetections = records.length;
        let allObjects = [];
        let allConfidences = [];
        let classMap = {};
        let dateMap = {};
        let classConfidenceMap = {};

        records.forEach(record => {
            const detectResults = record.detect_results || [];
            detectResults.forEach(obj => {
                allObjects.push(obj);
                allConfidences.push(obj.confidence || 0);
                const cls = obj.class || '未知';
                classMap[cls] = (classMap[cls] || 0) + 1;
                classConfidenceMap[cls] = classConfidenceMap[cls] || [];
                classConfidenceMap[cls].push(obj.confidence || 0);
            });

            // 按日期统计
            const date = record.detect_time ? record.detect_time.split(' ')[0] : '未知日期';
            dateMap[date] = (dateMap[date] || 0) + detectResults.length;
        });

        const totalObjects = allObjects.length;
        const classCount = Object.keys(classMap).length;
        const avgConfidence = allConfidences.length > 0
            ? (allConfidences.reduce((a, b) => a + b, 0) / allConfidences.length).toFixed(1)
            : 0;

        // 更新统计卡片
        document.getElementById('totalDetections').textContent = totalDetections;
        document.getElementById('classCount').textContent = classCount;
        document.getElementById('totalObjects').textContent = totalObjects;
        document.getElementById('avgConfidence').textContent = `${avgConfidence}%`;

        // 2. 目标分布图表
        const pestDistributionCtx = document.getElementById('pestDistributionChart').getContext('2d');
        const pestLabels = Object.keys(classMap);
        const pestValues = Object.values(classMap);
        const pestColors = ['#ef4444', '#78350f', '#22c55e', '#eab308', '#8b5cf6', '#06b6d4'];
        const pestData = {
            labels: pestLabels,
            datasets: [{
                label: '目标分布',
                data: pestValues,
                backgroundColor: pestLabels.map((_, i) => pestColors[i % pestColors.length]),
                borderWidth: 1
            }]
        };

        let pestDistributionChart = new Chart(pestDistributionCtx, {
            type: 'pie',
            data: pestData,
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { labels: { color: '#e2e8f0' } },
                    tooltip: {
                        callbacks: {
                            label: function (context) {
                                const label = context.label || '';
                                const value = context.raw || 0;
                                const total = context.dataset.data.reduce((a, b) => a + b, 0);
                                const percentage = Math.round((value / total) * 100);
                                return `${label}: ${value} (${percentage}%)`;
                            }
                        }
                    }
                }
            }
        });

        // 切换饼图
        document.getElementById('show-pie').addEventListener('click', function () {
            if (pestDistributionChart.config.type === 'pie') return;
            pestDistributionChart.destroy();
            pestDistributionChart = new Chart(pestDistributionCtx, {
                type: 'pie',
                data: pestData,
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { labels: { color: '#e2e8f0' } },
                        tooltip: {
                            callbacks: {
                                label: function (context) {
                                    const label = context.label || '';
                                    const value = context.raw || 0;
                                    const total = context.dataset.data.reduce((a, b) => a + b, 0);
                                    const percentage = Math.round((value / total) * 100);
                                    return `${label}: ${value} (${percentage}%)`;
                                }
                            }
                        }
                    }
                }
            });
            this.classList.add('btn-primary');
            this.classList.remove('btn-secondary');
            document.getElementById('show-bar').classList.remove('btn-primary');
            document.getElementById('show-bar').classList.add('btn-secondary');
        });

        // 切换柱状图
        document.getElementById('show-bar').addEventListener('click', function () {
            if (pestDistributionChart.config.type === 'bar') return;
            pestDistributionChart.destroy();
            pestDistributionChart = new Chart(pestDistributionCtx, {
                type: 'bar',
                data: pestData,
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: function (context) {
                                    const label = context.label || '';
                                    const value = context.raw || 0;
                                    const total = context.dataset.data.reduce((a, b) => a + b, 0);
                                    const percentage = Math.round((value / total) * 100);
                                    return `${label}: ${value} (${percentage}%)`;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            title: { display: true, text: '检测次数', color: '#e2e8f0' },
                            ticks: { color: '#e2e8f0' },
                            grid: { color: 'rgba(226, 232, 240, 0.1)' }
                        },
                        x: {
                            title: { display: true, text: '目标类别', color: '#e2e8f0' },
                            ticks: { color: '#e2e8f0' },
                            grid: { display: false }
                        }
                    }
                }
            });
            this.classList.add('btn-primary');
            this.classList.remove('btn-secondary');
            document.getElementById('show-pie').classList.remove('btn-primary');
            document.getElementById('show-pie').classList.add('btn-secondary');
        });

        // 3. 目标分布详情
        const distributionDetails = document.getElementById('distributionDetails');
        distributionDetails.innerHTML = '';
        pestLabels.forEach((cls, i) => {
            const count = classMap[cls];
            const total = pestValues.reduce((a, b) => a + b, 0);
            const percentage = Math.round((count / total) * 100);
            const color = pestColors[i % pestColors.length];
            const html = `
                <div class="flex items-center justify-between">
                    <div class="flex items-center">
                        <div class="w-3 h-3 rounded-full mr-2" style="background-color: ${color}"></div>
                        <span class="text-sm text-slate-300">${cls}</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-xs text-slate-400">${count}次</span>
                        <div class="w-24 h-1.5 bg-slate-700 rounded-full overflow-hidden">
                            <div class="h-full rounded-full" style="width: ${percentage}%; background-color: ${color}"></div>
                        </div>
                        <span class="text-xs text-slate-300">${percentage}%</span>
                    </div>
                </div>
            `;
            distributionDetails.insertAdjacentHTML('beforeend', html);
        });

        // 4. 检测趋势图表
        const detectionTrendCtx = document.getElementById('detectionTrendChart').getContext('2d');
        const trendLabels = Object.keys(dateMap).sort();
        const trendValues = trendLabels.map(date => dateMap[date]);
        const trendData = {
            labels: trendLabels,
            datasets: [{
                label: '每日检测目标数',
                data: trendValues,
                backgroundColor: '#3b82f6',
                borderColor: '#3b82f6',
                borderWidth: 2
            }]
        };

        let detectionTrendChart = new Chart(detectionTrendCtx, {
            type: 'bar',
            data: trendData,
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { labels: { color: '#e2e8f0' } },
                    tooltip: {
                        callbacks: {
                            label: function (context) {
                                return `${context.parsed.y} 个目标`;
                            }
                        }
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        title: { display: true, text: '目标数量', color: '#e2e8f0' },
                        ticks: { color: '#e2e8f0' },
                        grid: { color: 'rgba(226, 232, 240, 0.1)' }
                    },
                    x: {
                        title: { display: true, text: '日期', color: '#e2e8f0' },
                        ticks: { color: '#e2e8f0' },
                        grid: { display: false }
                    }
                }
            }
        });

        // 5. 置信度密度分布
        const confidenceDistributionCtx = document.getElementById('confidenceDistributionChart').getContext('2d');
        const confidenceBins = Array(100).fill(0);
        allConfidences.forEach(conf => {
            const bin = Math.floor(conf);
            if (bin >= 0 && bin < 100) confidenceBins[bin]++;
        });
        const maxBin = Math.max(...confidenceBins);
        const normalizedBins = confidenceBins.map(b => maxBin > 0 ? b / maxBin : 0);

        const densityData = {
            labels: Array.from({ length: 100 }, (_, i) => i + 1),
            datasets: [{
                label: '置信度密度分布',
                data: normalizedBins,
                borderColor: '#3b82f6',
                backgroundColor: 'rgba(59, 130, 246, 0.1)',
                borderWidth: 2,
                tension: 0.4,
                fill: true
            }]
        };

        new Chart(confidenceDistributionCtx, {
            type: 'line',
            data: densityData,
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { labels: { color: '#e2e8f0' } },
                    tooltip: {
                        callbacks: {
                            label: function (context) {
                                return `置信度: ${context.parsed.x}% | 密度: ${context.parsed.y.toFixed(3)}`;
                            }
                        }
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        title: { display: true, text: '密度', color: '#e2e8f0' },
                        ticks: { color: '#e2e8f0' },
                        grid: { color: 'rgba(226, 232, 240, 0.1)' }
                    },
                    x: {
                        title: { display: true, text: '置信度 (%)', color: '#e2e8f0' },
                        ticks: { color: '#e2e8f0', callback: function (value) { return value + '%'; } },
                        grid: { display: false }
                    }
                }
            }
        });

        // 6. 目标严重程度分析
        const severityAnalysis = document.getElementById('severityAnalysis');
        severityAnalysis.innerHTML = '';
        pestLabels.forEach(cls => {
            const confs = classConfidenceMap[cls];
            const avgClsConf = confs.length > 0
                ? (confs.reduce((a, b) => a + b, 0) / confs.length).toFixed(1)
                : 0;
            let severity = '低';
            let severityClass = 'severity-low';
            let severityText = '建议观察';
            if (avgClsConf >= 90) {
                severity = '高';
                severityClass = 'severity-high';
                severityText = '需紧急处理';
            } else if (avgClsConf >= 70) {
                severity = '中';
                severityClass = 'severity-medium';
                severityText = '建议处理';
            }
            const html = `
                <div class="stat-card p-6 rounded-xl">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h3 class="text-lg font-bold text-white">${cls}</h3>
                            <p class="text-xs text-slate-400">${cls.replace(/\s+/g, '_')}</p>
                        </div>
                        <span class="iconify text-${avgClsConf >= 90 ? 'red' : avgClsConf >= 70 ? 'yellow' : 'green'}-400 text-xl" data-icon="solar:${avgClsConf >= 90 ? 'bug' : avgClsConf >= 70 ? 'alert-triangle' : 'check-circle'}-bold"></span>
                    </div>
                    <div class="mb-4">
                        <div class="flex justify-between mb-1">
                            <span class="text-xs text-slate-400">平均置信度</span>
                            <span class="text-sm text-white font-medium">${avgClsConf}%</span>
                        </div>
                        <div class="w-full h-1.5 bg-slate-700 rounded-full overflow-hidden">
                            <div class="h-full rounded-full bg-green-500" style="width: ${avgClsConf}%"></div>
                        </div>
                    </div>
                    <div class="flex items-center justify-between">
                        <span class="px-2 py-1 rounded-full text-xs font-medium ${severityClass}">${severity}置信程度</span>
                        <span class="text-xs text-slate-400 flex items-center gap-1">
                            <span class="iconify text-sm" data-icon="solar:exclamation-circle-bold"></span>
                            ${severityText}
                        </span>
                    </div>
                </div>
            `;
            severityAnalysis.insertAdjacentHTML('beforeend', html);
        });
    }
});
</script>
</body>
</html>
