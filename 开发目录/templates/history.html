<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>极境守护 - 历史溯源</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<link rel="stylesheet" href="../static/history.css">
</head>

<body class="min-h-screen">
<!-- 加载动画容器 -->
<div class="loader-container" id="loaderContainer">
    <div class="loader"></div>
    <div class="loader-text">系统加载中...</div>
</div>

<!-- 导航栏 -->
<nav class="h-16 glass-panel fixed top-0 w-full z-50 flex items-center justify-between px-6 border-b border-cyan-500/30">
  <div class="flex items-center gap-3">
    <span class="iconify text-3xl text-cyan-400" data-icon="solar:shield-warning-bold-duotone"></span>
    <span class="text-xl font-bold tracking-wider text-white">POLAR GUARD <span class="text-cyan-400 text-sm">历史溯源</span></span>
  </div>
  <div class="flex items-center gap-8 text-sm">
    <a class="nav-link hover:text-cyan-400 whitespace-nowrap" href="/">导航中心</a>
    <a class="hover:text-cyan-400 whitespace-nowrap" href="/object_detection_controlcenter">目标检测</a>
    <a class="hover:text-cyan-400 whitespace-nowrap" href="/visual_dashboard">监控中心</a>
    <a class="text-cyan-400 border-b-2 border-cyan-400 pb-1 hover:text-cyan-400 whitespace-nowrap" href="/history">历史溯源</a>
    <a class="hover:text-cyan-400 whitespace-nowrap" href="/historical_data_analysis">数据分析</a>
    <a class="hover:text-cyan-400 whitespace-nowrap" href="/model_management">模型管理</a>
    <a class="hover:text-cyan-400 whitespace-nowrap" href="/edge_device_management">设备管理</a>
    <a class="w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center ml-2 relative flex-shrink-0" href="/user_center">
      <span class="iconify" data-icon="solar:user-bold"></span>
      <span class="absolute top-0 right-0 w-2 h-2 bg-red-500 rounded-full"></span>
    </a>
  </div>
</nav>

<main class="pt-24 px-8 pb-12 max-w-[1440px] mx-auto">
<div class="grid grid-cols-4 gap-8">
  <div class="col-span-1 space-y-6">
    <div class="glass-panel rounded-xl p-5">
      <h3 class="text-cyan-400 font-bold mb-4 flex items-center gap-2 text-lg">
        <span class="iconify" data-icon="solar:filter-bold"></span> 智能筛选
      </h3>
      <div class="space-y-4">
        <div>
          <label class="text-xs text-slate-400 block mb-2 uppercase tracking-widest">时间范围</label>
          <input id="filterDate" class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-sm focus:border-cyan-500 outline-none" type="date" value="2026-03-22"/>
        </div>
        <div>
          <label class="text-xs text-slate-400 block mb-2 uppercase tracking-widest">天气条件</label>
          <div class="grid grid-cols-2 gap-2">
            <label class="flex items-center gap-2 bg-slate-800/50 p-2 rounded cursor-pointer hover:bg-slate-700">
              <input checked class="accent-cyan-500 weather-checkbox" type="checkbox" value="暴雪"/>
              <span class="text-xs">暴雪</span>
            </label>
            <label class="flex items-center gap-2 bg-slate-800/50 p-2 rounded cursor-pointer hover:bg-slate-700">
              <input class="accent-cyan-500 weather-checkbox" type="checkbox" value="暴雨"/>
              <span class="text-xs">暴雨</span>
            </label>
            <label class="flex items-center gap-2 bg-slate-800/50 p-2 rounded cursor-pointer hover:bg-slate-700">
              <input checked class="accent-cyan-500 weather-checkbox" type="checkbox" value="强浓雾"/>
              <span class="text-xs">强浓雾</span>
            </label>
            <label class="flex items-center gap-2 bg-slate-800/50 p-2 rounded cursor-pointer hover:bg-slate-700">
              <input class="accent-cyan-500 weather-checkbox" type="checkbox" value="沙尘暴"/>
              <span class="text-xs">沙尘暴</span>
            </label>
          </div>
        </div>
        <div>
          <label class="text-xs text-slate-400 block mb-2 uppercase tracking-widest">置信度阈值 ( > )</label>
          <input id="confidenceSlider" class="w-full accent-cyan-500" max="100" min="0" type="range" value="85"/>
          <div class="flex justify-between text-[10px] text-slate-500 mt-1">
            <span>0%</span><span id="sliderValue">85%</span><span>100%</span>
          </div>
        </div>
        <button id="executeSearch" class="w-full bg-cyan-600 hover:bg-cyan-500 py-3 rounded-lg font-bold text-white shadow-lg shadow-cyan-900/40 transition-all">执行检索</button>
      </div>
    </div>

    <div class="glass-panel rounded-xl p-5">
      <h3 class="text-white font-bold mb-4 text-sm">快速下载报告</h3>
      <div class="space-y-2">
        <button class="w-full text-left p-3 rounded bg-slate-800 hover:bg-slate-700 flex justify-between items-center text-xs transition-colors">
          <span>2026-Q1 极端天气分析.pdf</span>
          <span class="iconify text-lg text-cyan-400" data-icon="solar:download-square-bold"></span>
        </button>
        <button class="w-full text-left p-3 rounded bg-slate-800 hover:bg-slate-700 flex justify-between items-center text-xs transition-colors">
          <span>今日识别效能概览.csv</span>
          <span class="iconify text-lg text-cyan-400" data-icon="solar:download-square-bold"></span>
        </button>
      </div>
    </div>
  </div>

  <div class="col-span-3">
    <div class="glass-panel rounded-xl p-6">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-xl font-bold flex items-center gap-3 underline decoration-cyan-500 decoration-4 underline-offset-8">
          检索结果集 <span id="resultCount" class="text-xs font-normal text-slate-400 bg-slate-800 px-2 py-1 rounded">共 0 条记录</span>
        </h2>
        <div class="flex gap-2">
          <button id="viewList" class="p-2 border border-slate-700 rounded hover:bg-slate-800 active:bg-cyan-600 active:border-cyan-500">
            <span class="iconify" data-icon="solar:list-bold"></span>
          </button>
          <button id="viewGrid" class="p-2 border border-slate-700 rounded hover:bg-slate-800">
            <span class="iconify" data-icon="solar:grid-nodes-bold"></span>
          </button>
        </div>
      </div>

      <div id="listView" class="overflow-x-auto">
        <table class="w-full text-left border-separate border-spacing-y-4">
          <thead>
            <tr class="text-xs text-slate-500 uppercase tracking-widest bg-slate-900/50">
              <th class="p-4 rounded-l-lg">事件预览</th>
              <th class="p-4">时间节点</th>
              <th class="p-4">监控位置</th>
              <th class="p-4">天气类型</th>
              <th class="p-4">AI 结果</th>
              <th class="p-4 rounded-r-lg text-center">操作</th>
            </tr>
          </thead>
          <tbody id="resultTableBody" class="text-sm"></tbody>
        </table>
      </div>

      <div id="gridView" class="hidden grid grid-cols-2 gap-4"></div>

      <div class="mt-8 flex justify-center gap-2">
        <button id="prevPage" class="px-4 py-2 bg-slate-800 border border-slate-700 rounded text-slate-400 hover:bg-slate-700 transition-colors">上一页</button>
        <div id="paginationNumbers" class="flex gap-2"></div>
        <button id="nextPage" class="px-4 py-2 bg-slate-800 border border-slate-700 rounded text-slate-400 hover:bg-slate-700 transition-colors">下一页</button>
      </div>
    </div>
  </div>
</div>
</main>

<!-- 详情取证弹窗 -->
<div id="detailModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/70 backdrop-blur-sm hidden">
  <div class="glass-panel w-full max-w-4xl max-h-[90vh] overflow-y-auto rounded-xl p-6 relative">
    <button id="closeModal" class="absolute top-4 right-4 text-slate-400 hover:text-white">
      <span class="iconify text-2xl" data-icon="solar:close-bold"></span>
    </button>
    <div class="mb-4 border-b border-slate-700 pb-4">
      <h3 class="text-xl font-bold text-cyan-400">检测记录详情</h3>
    </div>
    <div id="detailContent" class="space-y-6 text-sm"></div>
  </div>
</div>
<!-- 页脚 -->
<footer class="glass-panel py-6 border-t border-cyan-500/20">
    <div class="max-w-[1440px] mx-auto px-8 text-center text-slate-400 text-xs">
        <p>© 2025 极境守护目标检测系统 | 使用 ViT-Polaris 模型构建</p>
        <p class="mt-1">本系统仅供参考，不作为专业决策建议</p>
    </div>
</footer>
<script src="../static/history.js"></script>
</body>
</html>
