<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极端环境人体检测系统 - 登录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* 科幻风格样式 */
        body {
            background: linear-gradient(135deg, #0c1445, #1a237e, #311b92);
            color: #e0f7fa;
            font-family: 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: rgba(10, 25, 47, 0.8);
            border: 1px solid #00e5ff;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.3);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #00e5ff;
            color: #e0f7fa;
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: #00b8d4;
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
            color: #e0f7fa;
        }
        .btn-primary {
            background: linear-gradient(to right, #00e5ff, #00b8d4);
            border: none;
            border-radius: 5px;
            padding: 10px;
            font-weight: bold;
        }
        .btn-primary:hover {
            background: linear-gradient(to right, #00b8d4, #0091aa);
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
        }
        .error {
            color: #ff5252;
            margin-bottom: 15px;
            text-align: center;
        }
        .neon-text {
            text-shadow: 0 0 5px #00e5ff, 0 0 10px #00e5ff, 0 0 15px #00e5ff;
            text-align: center;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2 class="neon-text">极端环境人体检测系统</h2>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="mb-3">
                <label for="username" class="form-label">用户名</label>
                <input type="text" class="form-control" id="username" name="username" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">密码</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">登录</button>
        </form>
        <div class="mt-3 text-center">
            <a href="{{ url_for('auth.register') }}" style="color: #00e5ff;">还没有账号？立即注册</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
