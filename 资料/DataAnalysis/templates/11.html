<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>极境守护 - 智能数据分析中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen bg-[#020617] text-slate-100">
    <!-- 加载动画 -->
    <div class="loader-container" id="loaderContainer">
        <div class="loader"></div>
        <div class="loader-text">系统启动中...</div>
    </div>

    <!-- 导航栏 -->
    <nav class="h-16 glass-panel fixed top-0 w-full z-50 flex items-center justify-between px-6 border-b border-cyan-500/30">
        <div class="flex items-center gap-3">
            <span class="iconify text-3xl text-cyan-400" data-icon="solar:shield-warning-bold-duotone"></span>
            <span class="text-xl font-bold tracking-wider text-white">POLAR GUARD
                <span class="text-cyan-400 text-sm">智能数据分析</span>
            </span>
        </div>
        <div class="hidden md:flex items-center gap-6 text-sm">
            <a class="hover:text-cyan-400 transition-colors">导航中心</a>
            <a class="hover:text-cyan-400 transition-colors">目标检测</a>
            <a class="hover:text-cyan-400 transition-colors">监控中心</a>
            <a class="hover:text-cyan-400 transition-colors">历史溯源</a>
            <a class="text-cyan-400 border-b-2 border-cyan-400 pb-1">数据分析</a>
            <a class="hover:text-cyan-400 transition-colors">模型管理</a>
            <a class="hover:text-cyan-400 transition-colors">设备管理</a>
        </div>
    </nav>

    <!-- 主内容区 -->
    <div class="pt-20 px-4 md:px-8 max-w-7xl mx-auto pb-20">
        <!-- 状态条 -->
        <div class="glass-panel px-4 py-2 rounded-lg flex items-center gap-3 text-sm mb-6">
            <span class="iconify text-green-400" data-icon="mdi:check-circle"></span>
            <span id="connStatus">系统连接正常 · 模型已就绪</span>
            <span class="ml-auto text-cyan-300" id="currentTime"></span>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- 左侧控制面板 -->
            <div class="glass-panel p-6 rounded-2xl col-span-1">
                <h2 class="text-xl font-bold text-white flex items-center gap-2 mb-4">
                    <span class="iconify text-cyan-400" data-icon="mdi:file-upload"></span>
                    任务配置
                </h2>

                <!-- 场景选择 -->
                <div class="mb-5">
                    <label class="text-cyan-300 text-sm mb-2 block">分析场景</label>
                    <select id="sceneSelect" class="form-control w-full"></select>
                </div>

                <!-- 自定义场景 -->
                <div class="flex gap-2 mb-5">
                    <input id="newSceneInput" placeholder="新增自定义场景" class="form-control flex-1">
                    <button id="addSceneBtn" class="btn-primary whitespace-nowrap">添加场景</button>
                </div>

                <!-- 文件上传 -->
                <div class="mb-5">
                    <label class="text-cyan-300 text-sm mb-2 block">上传图片/视频</label>
                    <input id="fileInput" type="file" accept="image/*,video/mp4" class="form-control w-full">
                </div>

                <!-- 预览图 -->
                <div id="previewWrapper" class="hidden mb-4">
                    <div class="rounded-lg overflow-hidden border border-cyan-500/20 h-48 bg-slate-900/50 flex items-center justify-center">
                        <img id="previewImg" class="max-h-full object-contain">
                        <video id="previewVideo" class="max-h-full object-contain hidden" controls></video>
                    </div>
                </div>

                <!-- 操作按钮 -->
                <button id="startAnalyzeBtn" class="btn-primary w-full py-3 text-base flex items-center justify-center gap-2">
                    <span class="iconify" data-icon="mdi:robot"></span>
                    启动AI智能分析
                </button>

                <button id="clearResultBtn" class="mt-3 w-full py-2 bg-slate-800/60 hover:bg-slate-700/60 rounded-lg transition-colors text-slate-300">
                    清空所有结果
                </button>
            </div>

            <!-- 右侧结果展示 -->
            <div class="col-span-1 lg:col-span-2 space-y-6">
                <!-- 分析结果卡片 -->
                <div class="glass-panel p-6 rounded-2xl hidden" id="resultCard">
                    <h2 class="text-xl font-bold text-white flex items-center gap-2 mb-4">
                        <span class="iconify text-green-400" data-icon="mdi:chart-box"></span>
                        分析完成
                    </h2>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                        <div class="bg-slate-800/40 p-4 rounded-lg border border-cyan-500/10">
                            <div class="text-sm text-slate-400">检测人数</div>
                            <div class="text-2xl font-bold text-cyan-300" id="humanCount">0</div>
                        </div>
                        <div class="bg-slate-800/40 p-4 rounded-lg border border-cyan-500/10">
                            <div class="text-sm text-slate-400">物体数量</div>
                            <div class="text-2xl font-bold text-cyan-300" id="objectCount">0</div>
                        </div>
                    </div>

                    <!-- 环境信息 -->
                    <div class="bg-slate-800/20 p-4 rounded-lg mb-4">
                        <div class="text-cyan-300 text-sm mb-2">环境分析</div>
                        <div id="envInfo" class="text-slate-300 text-sm space-y-1"></div>
                    </div>

                    <!-- JSON 结果 -->
                    <div class="relative">
                        <button id="copyJsonBtn" class="absolute right-2 top-2 btn-primary text-xs px-2 py-1">复制JSON</button>
                        <pre class="bg-slate-900/70 text-cyan-100 p-4 rounded-lg text-xs overflow-auto max-h-64 font-mono" id="jsonResult"></pre>
                    </div>
                </div>

                <!-- 图表 -->
                <div class="glass-panel p-6 rounded-2xl hidden" id="chartCard">
                    <h2 class="text-lg font-bold text-white mb-4">目标分布统计</h2>
                    <div class="h-64">
                        <canvas id="analysisChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== 核心配置 ====================
        const API_BASE = "http://127.0.0.1:8000/api";
        let currentResult = null;
        let chartInstance = null;

        // ==================== 页面加载 ====================
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(hideLoader, 1200);
            updateTime();
            loadSceneList();
            bindEvents();
        });

        // 隐藏加载
        function hideLoader() {
            const el = document.getElementById('loaderContainer');
            el.classList.add('loader-hidden');
            setTimeout(() => el.remove(), 500);
        }

        // 时间更新
        function updateTime() {
            const now = new Date().toLocaleString();
            document.getElementById('currentTime').innerText = now;
            setInterval(() => {
                document.getElementById('currentTime').innerText = new Date().toLocaleString();
            }, 1000);
        }

        // ==================== 场景加载 ====================
        async function loadSceneList() {
            try {
                const res = await axios.get(`${API_BASE}/scenes`);
                const select = document.getElementById('sceneSelect');
                select.innerHTML = "";
                res.data.default_scenes.forEach(s => {
                    const opt = document.createElement('option');
                    opt.value = s;
                    opt.innerText = s;
                    select.appendChild(opt);
                });
                res.data.custom_scenes.forEach(s => {
                    const opt = document.createElement('option');
                    opt.value = s;
                    opt.innerText = `${s}（自定义）`;
                    select.appendChild(opt);
                });
            } catch (e) {
                document.getElementById('connStatus').innerText = "后端连接失败，请检查服务";
            }
        }

        // ==================== 事件绑定 ====================
        function bindEvents() {
            // 添加场景
            document.getElementById('addSceneBtn').onclick = async () => {
                const name = document.getElementById('newSceneInput').value.trim();
                if (!name) return alert("请输入场景名称");
                await axios.post(`${API_BASE}/scenes`, { scene_name: name });
                loadSceneList();
                document.getElementById('newSceneInput').value = "";
            };

            // 文件预览
            document.getElementById('fileInput').onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const wrapper = document.getElementById('previewWrapper');
                const img = document.getElementById('previewImg');
                const video = document.getElementById('previewVideo');
                wrapper.classList.remove('hidden');

                if (file.type.startsWith('image')) {
                    img.classList.remove('hidden');
                    video.classList.add('hidden');
                    img.src = URL.createObjectURL(file);
                } else {
                    video.classList.remove('hidden');
                    img.classList.add('hidden');
                    video.src = URL.createObjectURL(file);
                }
            };

            // 开始分析
            document.getElementById('startAnalyzeBtn').onclick = startAnalyze;

            // 复制JSON
            document.getElementById('copyJsonBtn').onclick = () => {
                navigator.clipboard.writeText(document.getElementById('jsonResult').innerText);
                alert("复制成功！");
            };

            // 清空
            document.getElementById('clearResultBtn').onclick = () => {
                document.getElementById('resultCard').classList.add('hidden');
                document.getElementById('chartCard').classList.add('hidden');
                document.getElementById('fileInput').value = "";
                document.getElementById('previewWrapper').classList.add('hidden');
                currentResult = null;
            };
        }

        // ==================== 开始分析 ====================
        async function startAnalyze() {
            const file = document.getElementById('fileInput').files[0];
            const scene = document.getElementById('sceneSelect').value;
            if (!file) return alert("请选择文件");

            const btn = document.getElementById('startAnalyzeBtn');
            btn.disabled = true;
            btn.innerText = "分析中...";

            const form = new FormData();
            form.append("file", file);
            form.append("scene", scene);

            try {
                const res = await axios.post(`${API_BASE}/analyze`, form);
                currentResult = res.data.data;
                showResult(currentResult);
            } catch (e) {
                alert("分析失败：" + (e.message || "服务器错误"));
            } finally {
                btn.disabled = false;
                btn.innerText = "启动AI智能分析";
            }
        }

        // ==================== 展示结果 ====================
        function showResult(data) {
            document.getElementById('resultCard').classList.remove('hidden');
            document.getElementById('chartCard').classList.remove('hidden');

            document.getElementById('humanCount').innerText = data.object_detection.humans.count;
            document.getElementById('objectCount').innerText = data.object_detection.non_humans.count;

            // 环境信息
            let envHtml = "";
            for (const k in data.environment_features) {
                envHtml += `${k}：${data.environment_features[k]}<br>`;
            }
            document.getElementById('envInfo').innerHTML = envHtml;
            document.getElementById('jsonResult').innerText = JSON.stringify(data, null, 4);

            // 绘制图表
            renderChart([
                { name: '人员', value: data.object_detection.humans.count },
                { name: '物体', value: data.object_detection.non_humans.count }
            ]);
        }

        // ==================== 图表 ====================
        function renderChart(data) {
            const ctx = document.getElementById('analysisChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();

            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: data.map(d => d.name),
                    datasets: [{
                        label: '检测数量',
                        data: data.map(d => d.value),
                        backgroundColor: ['#22d3ee', '#38bdf8'],
                        borderRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    }
                }
            });
        }
    </script>
</body>
</html>
