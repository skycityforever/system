<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>极境守护 - 数据分析中心</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<link rel="stylesheet" href="../static/historical_data_analysis.css">
</head>

<body class="min-h-screen">
<!-- 加载动画 -->
<div class="loader-container" id="loaderContainer">
    <div class="loader"></div>
    <div class="loader-text">系统加载中...</div>
</div>

<!-- 导航栏 -->
<nav class="h-16 glass-panel fixed top-0 w-full z-50 flex items-center justify-between px-6 border-b border-cyan-500/30">
  <div class="flex items-center gap-3">
    <span class="iconify text-3xl text-cyan-400" data-icon="solar:shield-warning-bold-duotone"></span>
    <span class="text-xl font-bold tracking-wider text-white">POLAR GUARD <span class="text-cyan-400 text-sm">数据分析中心</span></span>
  </div>
  <div class="flex items-center gap-8 text-sm">
    <a class="nav-link hover:text-cyan-400 whitespace-nowrap" href="/">导航中心</a>
    <a class="hover:text-cyan-400 whitespace-nowrap" href="/object_detection_controlcenter">目标检测</a>
    <a class="hover:text-cyan-400 whitespace-nowrap" href="/visual_dashboard">监控中心</a>
    <a class="hover:text-cyan-400 whitespace-nowrap" href="/history">历史溯源</a>
    <a class="text-cyan-400 border-b-2 border-cyan-400 pb-1 hover:text-cyan-400 whitespace-nowrap" href="/historical_data_analysis">数据分析</a>
    <a class="hover:text-cyan-400 whitespace-nowrap" href="/model_management">模型管理</a>
    <a class="hover:text-cyan-400 whitespace-nowrap" href="/edge_device_management">设备管理</a>
    <a class="w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center ml-2 relative flex-shrink-0" href="/user_center">
      <span class="iconify" data-icon="solar:user-bold"></span>
      <span class="absolute top-0 right-0 w-2 h-2 bg-red-500 rounded-full"></span>
    </a>
  </div>
</nav>

<main class="pt-24 px-8 pb-12 max-w-[1440px] mx-auto">
    <!-- 数据概览 -->
    <section class="mb-10">
        <h2 class="text-xl font-bold mb-6 text-cyan-300">数据概览</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            <div class="stat-card p-6 rounded-xl">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-sm font-semibold text-slate-300">总检测次数</h3>
                    <span class="iconify text-cyan-400 text-xl" data-icon="solar:flask-bold"></span>
                </div>
                <p id="totalDetectCount" class="text-3xl font-bold text-white">0</p>
                <p class="text-xs text-slate-400 mt-2">自系统运行以来的检测总数</p>
            </div>

            <div class="stat-card p-6 rounded-xl">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-sm font-semibold text-slate-300">目标类别数</h3>
                    <span class="iconify text-green-400 text-xl" data-icon="solar:cube-bold"></span>
                </div>
                <p id="classCount" class="text-3xl font-bold text-white">0</p>
                <p class="text-xs text-slate-400 mt-2">已识别的目标类别数量</p>
            </div>

            <div class="stat-card p-6 rounded-xl">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-sm font-semibold text-slate-300">目标总数</h3>
                    <span class="iconify text-red-400 text-xl" data-icon="solar:users-group-bold"></span>
                </div>
                <p id="totalTargetCount" class="text-3xl font-bold text-white">0</p>
                <p class="text-xs text-slate-400 mt-2">所有检测中发现的目标总数</p>
            </div>

            <div class="stat-card p-6 rounded-xl">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-sm font-semibold text-slate-300">平均置信度</h3>
                    <span class="iconify text-purple-400 text-xl" data-icon="solar:percent-bold"></span>
                </div>
                <p id="avgConfidence" class="text-3xl font-bold text-white">0%</p>
                <p class="text-xs text-slate-400 mt-2">所有检测结果的平均置信度</p>
            </div>
        </div>
    </section>

    <!-- 目标分布 -->
    <section class="mb-10">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold text-cyan-300">目标分布</h2>
            <div class="flex gap-2">
                <button id="show-pie" class="btn-primary px-4 py-1.5 rounded-lg text-sm">饼图</button>
                <button id="show-bar" class="btn-secondary px-4 py-1.5 rounded-lg text-sm">柱状图</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 chart-container p-6 rounded-xl">
                <canvas id="pestDistributionChart" height="300"></canvas>
            </div>

            <div class="chart-container p-6 rounded-xl">
                <h3 class="text-sm font-semibold mb-4 text-slate-200">目标分布详情</h3>
                <div id="distributionDetail" class="space-y-4 max-h-[300px] overflow-y-auto pr-2 custom-scrollbar">
                </div>
            </div>
        </div>
    </section>

    <!-- 检测趋势 -->
    <section class="mb-10">
        <h2 class="text-xl font-bold mb-6 text-cyan-300">目标检测趋势</h2>
        <div class="chart-container p-6 rounded-xl">
            <div class="flex justify-between items-center mb-4">
                <span class="text-sm text-slate-200">按小时检测数量趋势</span>
                <button id="trend-bar" class="btn-primary px-4 py-1.5 rounded-lg text-sm">柱状图</button>
            </div>
            <div id="trendChartContainer" class="relative">
                <canvas id="detectionTrendChart" height="350"></canvas>
                <div id="chartNoData" class="absolute inset-0 flex items-center justify-center bg-slate-900/80 z-10 hidden">
                    <div class="text-center">
                        <span class="iconify text-slate-500 text-5xl mb-3" data-icon="solar:chart-line-linear"></span>
                        <p class="text-slate-400 text-sm">暂无趋势数据</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 置信度密度分布 -->
    <section class="mb-10">
        <h2 class="text-xl font-bold mb-6 text-cyan-300">检测置信度密度分布</h2>
        <div class="chart-container p-6 rounded-xl">
            <canvas id="confidenceDistributionChart" height="300"></canvas>
        </div>
    </section>

    <!-- 目标类别分析 -->
    <section class="mb-10">
        <h2 class="text-xl font-bold mb-6 text-cyan-300">目标类别详细分析</h2>
        <div id="classAnalysisCards" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        </div>
    </section>
</main>

<footer class="glass-panel py-6 border-t border-cyan-500/20">
    <div class="max-w-[1440px] mx-auto px-8 text-center text-slate-400 text-xs">
        <p>© 2026 极境守护目标检测系统 | 使用智能视觉模型构建</p>
        <p class="mt-1">本系统仅供参考，不作为专业决策建议</p>
    </div>
</footer>

<script src="../static/historical_data_analysis.js"></script>
</body>
</html>
